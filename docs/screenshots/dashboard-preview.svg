<svg width="1418" height="462" viewBox="0 0 1418 462" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Content Radar winner panel screenshot</title>
  <desc id="desc">Скриншот блока победителя Content Radar с каналом ЛаймКонтент Медиа и метриками сравнения</desc>
  <defs>
    <linearGradient id="winnerGradient" x1="96" y1="56" x2="1274" y2="416" gradientUnits="userSpaceOnUse">
      <stop stop-color="#172136"/>
      <stop offset="0.58" stop-color="#1E293B"/>
      <stop offset="1" stop-color="#0E4A46"/>
    </linearGradient>
    <linearGradient id="outerGradient" x1="67" y1="27" x2="1301" y2="443" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E293B"/>
      <stop offset="1" stop-color="#22364C"/>
    </linearGradient>
    <filter id="softShadow" x="0" y="-40" width="1418" height="560" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#020617" flood-opacity="0.52"/>
    </filter>
  </defs>

  <rect width="1418" height="462" fill="#0F172A"/>
  <rect x="68" y="28" width="1233" height="415" rx="16" fill="url(#outerGradient)" stroke="#34445B" stroke-width="2" filter="url(#softShadow)"/>
  <rect x="96" y="56" width="1178" height="360" rx="17" fill="url(#winnerGradient)" stroke="#0F947D" stroke-width="2"/>

  <text x="122" y="101" fill="#6FF2BD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="800">Главный результат сравнения</text>
  <text x="122" y="128" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">Победитель</text>

  <text x="122" y="192" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="47" font-weight="900">ЛаймКонтент Медиа</text>
  <text x="122" y="230" fill="#D7FAF6" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="500">Лидер усиливает формат «Видео» и стабильно публикует в слот «13:00», где лучше всего работает тема «антикризисный»</text>

  <text x="122" y="273" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="800">Слабая сторона:</text>
  <text x="262" y="273" fill="#E2E8F0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="500">Нет явных слабых сторон</text>

  <rect x="123" y="303" width="365" height="85" rx="10" fill="#152238" stroke="#34445B" stroke-width="2"/>
  <text x="137" y="332" fill="#94A3B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="500">Вовлечённость лидера</text>
  <text x="137" y="370" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="900">4535.3</text>

  <rect x="502" y="303" width="365" height="85" rx="10" fill="#152238" stroke="#34445B" stroke-width="2"/>
  <text x="516" y="332" fill="#94A3B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="500">Позиция вашего канала</text>
  <text x="516" y="370" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="900">#3</text>

  <rect x="881" y="303" width="364" height="85" rx="10" fill="#152238" stroke="#34445B" stroke-width="2"/>
  <text x="895" y="332" fill="#94A3B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="500">Ваше отставание от лидера</text>
  <text x="895" y="370" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="900">84.8%</text>
</svg>